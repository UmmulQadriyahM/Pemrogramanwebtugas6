<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        .nav-link{
            transition: 0.3s;
        }

        .nav-link:hover{
            background-color: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        .nav-link.active{
            background-color: rgba(255,255,255,0.2);
            border-radius: 5px;
        }

        /* CARD BIRU CONSISTENT */
        .card-gradient-1{
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .card-gradient-2{
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .card-gradient-3{
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .card{
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Aplikasi Manajemen Pegawai</span>
    </div>
</nav>

<div class="container-fluid">
<div class="row">


<div class="col-md-3 col-lg-2 bg-dark text-white min-vh-100 p-3">
    <h5 class="mb-4">Menu</h5>

    <ul class="nav flex-column">

        <li>
            <a href="dashboard.html" class="nav-link text-white active">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
        </li>

        <li>
            <a href="tabel.html" class="nav-link text-white">
                <i class="bi bi-people me-2"></i> Data Pegawai
            </a>
        </li>

        <li>
            <a href="#" class="nav-link text-white">
                <i class="bi bi-briefcase me-2"></i> Data Jabatan
            </a>
        </li>

        <li>
            <a href="login.html" class="nav-link text-danger">
                <i class="bi bi-box-arrow-right me-2"></i> Keluar
            </a>
        </li>

    </ul>
</div>

<div class="col-md-9 col-lg-10 p-4">
    <h2>Welcome 👋</h2>
    <p>Login sebagai <strong>Administrator</strong></p>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card card-gradient-1 shadow">
                <div class="card-body">
                    <h5>Total Pegawai</h5>
                    <h3>5</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-gradient-2 shadow">
                <div class="card-body">
                    <h5>Jabatan</h5>
                    <h3>5</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-gradient-3 shadow">
                <div class="card-body">
                    <h5>Status</h5>
                    <h3>Aktif</h3>
                </div>
            </div>
        </div>

    </div>
</div>

</div>
</div>

</body>
</html>
