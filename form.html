<!DOCTYPE html>
<html>
<head>
    <title>Tambah Pegawai</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        .nav-link{
            transition: 0.3s;
        }

        .nav-link:hover{
            background-color: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        .nav-link.active{
            background-color: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
    </style>
</head>

<body>


<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Aplikasi Manajemen Pegawai</span>
    </div>
</nav>

<div class="container-fluid">
<div class="row">


<div class="col-md-3 col-lg-2 bg-dark text-white min-vh-100 p-3">
    <h5 class="mb-4">Menu</h5>

    <ul class="nav flex-column">

        <li>
            <a href="dashboard.html" class="nav-link text-white">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </li>

        <li>
            <a href="tabel.html" class="nav-link text-white">
                <i class="bi bi-people"></i> Data Pegawai
            </a>
        </li>

        <li>
            <a href="#" class="nav-link text-white">
                <i class="bi bi-briefcase"></i> Data Jabatan
            </a>
        </li>

        <li>
            <a href="login.html" class="nav-link text-danger">
                <i class="bi bi-box-arrow-right"></i> Keluar
            </a>
        </li>

    </ul>
</div>


<div class="col-md-9 col-lg-10 p-4">

    <div class="card shadow p-4">
        <h3 class="mb-4">Tambah Pegawai</h3>

        <form>

            <div class="mb-3">
                <label class="form-label">Nama</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Jabatan</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-briefcase"></i>
                    </span>
                    <select class="form-select">
                        <option>Direktur</option>
                        <option>Manajer</option>
                        <option>Marketing</option>
                        <option>Kasir</option>
                        <option>Chef</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Tanggal Lahir</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-calendar"></i>
                    </span>
                    <input type="date" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Jenis Kelamin</label><br>
                <input type="radio" name="jk"> Laki-laki
                <input type="radio" name="jk" class="ms-3"> Perempuan
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary">
                    <i class="bi bi-save"></i> Simpan
                </button>

                <button type="reset" class="btn btn-warning">
                    <i class="bi bi-x-circle"></i> Batal
                </button>
            </div>

        </form>
    </div>

</div>

</div>
</div>

</body>
</html>
